@if (apiLoaded) {
  <google-map 
    [center]="center" 
    [zoom]="zoom" 
    width="100%" 
    height="500px">
    
    @for (s of allStudents(); track s.personalId) {
      <map-marker
        [position]="{ lat: s.Latitude, lng: s.Longitude }"
        [label]="{ text: s.personalId }">
      </map-marker>
    }
  </google-map>
} @else {
  <div class="loading-map">
    <p>טוען את המפה  ם...</p>
  </div>
}
